<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <script>
    (function setPagesBasePath() {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const firstPart = pathParts[0];
      const rootSegments = new Set([
        'generator',
        'css',
        'js',
        'assets',
        'references',
        'third_party',
        'frontify-block',
        'attached_assets',
        'index.html',
        'marquee-ui.html',
        'favicon.ico',
        '404.html',
        '.nojekyll'
      ]);
      const isLocalFile = window.location.protocol === 'file:';
      const basePath = isLocalFile
        ? './'
        : window.location.hostname.endsWith('.github.io') && firstPart && !rootSegments.has(firstPart)
          ? `/${firstPart}/`
          : '/';

      window.__RPI_PAGES_BASE_PATH__ = basePath;
      document.write(`<base href="${basePath}">`);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="description" content="404 rerouting page for the RPI Bar Generator.">
  <title>404 | RPI Bar Generator</title>
  <link href="css/marquee-ui.css" rel="stylesheet" type="text/css">
  <style>
    :root {
      --hero-scale: 1;
    }

    html {
      min-height: 100%;
      background: var(--rpi-white);
    }

    body {
      background: var(--rpi-white);
      color: var(--rpi-black);
    }

    .page-wrapper {
      height: var(--viewport-height);
      min-height: var(--viewport-height);
      background: var(--rpi-white);
    }

    .startup_prompt {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }

    .startup_prompt_inner {
      background: var(--rpi-white);
      box-shadow:
        0 6px 14px rgba(0, 0, 0, 0.16),
        0 12px 20px rgba(214, 0, 28, 0.24);
    }

    .startup_prompt_inner::before {
      display: none;
    }

    .startup_prompt_text {
      color: #202020;
      text-decoration: none;
      text-shadow: none;
    }

    .hero_shell {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .hero_layout {
      height: var(--viewport-height);
      min-height: var(--viewport-height);
    }

    .hero_cluster {
      width: 1360px;
      height: 330px;
      color: var(--rpi-black);
      pointer-events: none;
    }

    .hero_copy {
      width: auto;
    }

    .hero_title {
      color: var(--rpi-black);
    }

    .fallback_mascot {
      position: absolute;
      right: 0;
      bottom: 8px;
      width: 360px;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <div id="startup-style-prompt" class="startup_prompt is-visible" aria-hidden="false" role="status"
      aria-live="polite" aria-atomic="true">
      <div class="startup_prompt_inner">
        <a id="fallback-status" class="startup_prompt_text" href="/">Rerouting in 5.0s</a>
      </div>
    </div>

    <div class="padding-global hero_shell">
      <div class="container-large hero_layout">
        <div class="hero_cluster">
          <div class="hero_copy">
            <h1 id="fallback-title" class="hero_title" aria-label="Oops. That's awkward.">
              <span class="hero_title-line is-top">Oops...</span>
              <span class="hero_title-line is-bottom">That's awkward.</span>
            </h1>
          </div>

          <img class="fallback_mascot" src="assets/images/puckman.svg" alt="">
        </div>
      </div>
    </div>
  </main>

  <script>
    (function setupFallbackPage() {
      const redirectDelayMs = 5000;
      const heroClusterWidth = 1360;
      const heroClusterHeight = 330;
      const heroMinScale = 0.25;
      const basePath = window.__RPI_PAGES_BASE_PATH__ || '/';
      const statusLink = document.getElementById('fallback-status');
      const script = document.createElement('script');
      let countdownIntervalId = null;
      let redirectTimeoutId = null;

      function getViewportMetrics() {
        const visualViewport = window.visualViewport;
        const width = visualViewport && Number.isFinite(visualViewport.width) && visualViewport.width > 0
          ? visualViewport.width
          : window.innerWidth;
        const height = visualViewport && Number.isFinite(visualViewport.height) && visualViewport.height > 0
          ? visualViewport.height
          : window.innerHeight;

        return { width, height };
      }

      function getCssPixelValue(value, fallbackValue) {
        const numericValue = Number.parseFloat(value);
        return Number.isFinite(numericValue) ? numericValue : fallbackValue;
      }

      function syncHeroScale() {
        const root = document.documentElement;
        const rootStyles = window.getComputedStyle(root);
        const { width, height } = getViewportMetrics();
        const heroLayout = document.querySelector('.hero_layout');
        const heroLayoutStyles = heroLayout ? window.getComputedStyle(heroLayout) : null;
        const pagePadding = getCssPixelValue(rootStyles.getPropertyValue('--page-padding'), 24);
        const verticalPaddingTop = heroLayoutStyles ? getCssPixelValue(heroLayoutStyles.paddingTop, 24) : 24;
        const verticalPaddingBottom = heroLayoutStyles ? getCssPixelValue(heroLayoutStyles.paddingBottom, 32) : 32;
        const availableWidth = Math.max(0, width - (pagePadding * 2));
        const availableHeight = Math.max(0, height - verticalPaddingTop - verticalPaddingBottom);
        const scale = Math.min(1, availableWidth / heroClusterWidth, availableHeight / heroClusterHeight);

        root.style.setProperty('--viewport-height', `${Math.round(height)}px`);
        root.style.setProperty('--hero-scale', String(Math.max(heroMinScale, scale)));
      }

      function clearTimers() {
        window.clearTimeout(redirectTimeoutId);
        window.clearInterval(countdownIntervalId);
      }

      function startRedirect(redirectUrl) {
        const startedAt = Date.now();
        statusLink.setAttribute('href', redirectUrl);

        countdownIntervalId = window.setInterval(function updateCountdown() {
          const elapsed = Date.now() - startedAt;
          const remainingMs = Math.max(0, redirectDelayMs - elapsed);
          statusLink.textContent = `Rerouting in ${(remainingMs / 1000).toFixed(1)}s`;
        }, 50);

        redirectTimeoutId = window.setTimeout(function performRedirect() {
          clearTimers();
          statusLink.textContent = 'Rerouting now';
          window.location.replace(redirectUrl);
        }, redirectDelayMs);
      }

      statusLink.setAttribute('href', basePath);
      syncHeroScale();
      window.addEventListener('resize', syncHeroScale, { passive: true });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncHeroScale, { passive: true });
      }

      if (window.location.protocol === 'file:') {
        statusLink.setAttribute('href', 'index.html');
        return;
      }

      script.src = `${basePath}js/utils/pagesFallback.js`;
      script.onload = function onFallbackScriptLoad() {
        const redirectUrl = window.PagesFallback && typeof window.PagesFallback.getPagesFallbackRedirectUrl === 'function'
          ? window.PagesFallback.getPagesFallbackRedirectUrl(window.location.pathname, window.location.search, {
            hostname: window.location.hostname
          })
          : basePath;

        startRedirect(redirectUrl || basePath);
      };

      script.onerror = function onFallbackScriptError() {
        clearTimers();
        statusLink.textContent = 'Return home';
      };

      document.head.appendChild(script);
    })();
  </script>
</body>

</html>
