<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <script>
    (function setPagesBasePath() {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const firstPart = pathParts[0];
      const rootSegments = new Set([
        'generator',
        'css',
        'js',
        'assets',
        'references',
        'third_party',
        'frontify-block',
        'attached_assets',
        'index.html',
        'marquee-ui.html',
        'favicon.ico',
        '404.html',
        '.nojekyll'
      ]);
      const basePath = window.location.hostname.endsWith('.github.io') && firstPart && !rootSegments.has(firstPart)
        ? `/${firstPart}/`
        : '/';

      window.__RPI_PAGES_BASE_PATH__ = basePath;
      document.write(`<base href="${basePath}">`);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="robots" content="noindex">
  <meta name="description" content="404 recovery page for the RPI Bar Generator.">
  <title>404 | RPI Bar Generator</title>
  <link href="css/marquee-ui.css" rel="stylesheet" type="text/css">
  <style>
    .error_copy {
      width: 640px;
      gap: 1.2rem;
      pointer-events: auto;
    }

    .error_kicker,
    .error_note,
    .error_credit_label {
      margin: 0;
      font-family: 'RPIGeistMono', 'SFMono-Regular', Consolas, monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .error_kicker {
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.82rem;
    }

    .error_title {
      gap: 0.35rem;
    }

    .error_title .hero_title-line.is-top {
      font-size: 78px;
    }

    .error_title .hero_title-line.is-bottom {
      font-size: 118px;
    }

    .error_body {
      margin: 0;
      max-width: 32rem;
      color: rgba(255, 255, 255, 0.82);
      font-size: 1.05rem;
      line-height: 1.65;
    }

    .error_actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      pointer-events: auto;
    }

    .error_link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0.8rem 1.15rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      color: var(--rpi-white);
      font-size: 0.95rem;
      line-height: 1.2;
      text-decoration: none;
      transition:
        border-color 180ms ease,
        background-color 180ms ease,
        transform 180ms ease;
    }

    .error_link:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.08);
    }

    .error_link.is-primary {
      border-color: rgba(214, 0, 28, 0.9);
      background: var(--rpi-red);
    }

    .error_link.is-primary:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: #bf0018;
    }

    .error_link.is-ghost {
      border-color: transparent;
      background: transparent;
      color: rgba(255, 255, 255, 0.72);
      padding-inline: 0.15rem;
    }

    .error_link.is-ghost:hover {
      background: transparent;
      border-color: transparent;
      color: var(--rpi-white);
      transform: none;
    }

    .error_note {
      color: rgba(255, 255, 255, 0.56);
      font-size: 0.76rem;
      line-height: 1.6;
    }

    .error_credit {
      left: 610px;
      bottom: 54px;
      max-width: 16rem;
      gap: 0.5rem;
      white-space: normal;
      pointer-events: none;
    }

    .error_credit .credit_line {
      display: block;
    }

    .error_credit_label {
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.82rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .error_credit_value {
      color: var(--rpi-white);
    }

    @media (max-width: 900px) {
      .error_copy {
        width: 560px;
      }

      .error_credit {
        left: 590px;
        bottom: 48px;
        max-width: 14rem;
      }
    }

    @media (max-width: 640px) {
      .error_copy {
        width: 100%;
        max-width: 24rem;
        gap: 0.95rem;
      }

      .error_title .hero_title-line.is-top {
        font-size: clamp(3rem, 12vw, 4rem);
      }

      .error_title .hero_title-line.is-bottom {
        font-size: clamp(4.1rem, 16vw, 5.6rem);
      }

      .error_body {
        font-size: 0.98rem;
      }

      .error_actions {
        width: 100%;
      }

      .error_link {
        width: 100%;
      }

      .error_link.is-ghost {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrapper marquee_page">
    <main class="main-wrapper">
      <section class="section_marquee_hero">
        <div class="marquee_scene">
          <div class="marquee_stage" id="marquee-stage" data-marquee-stage></div>
        </div>

        <div id="startup-style-prompt" class="startup_prompt is-visible" aria-hidden="true" role="status"
          aria-live="polite" aria-atomic="true">
          <div class="startup_prompt_inner">
            <p class="startup_prompt_text" id="recovery-pill-text">404. Recovering route...</p>
          </div>
        </div>

        <div class="padding-global hero_shell">
          <div class="container-large hero_layout">
            <div class="hero_cluster">
              <div class="hero_copy error_copy">
                <p class="error_kicker">404 / Page not found</p>
                <div class="hero_brand" role="img" aria-label="RPI logo"></div>
                <h1 class="hero_title error_title">
                  <span class="hero_title-line is-top">Wrong</span>
                  <span class="hero_title-line is-bottom">Turn</span>
                </h1>
                <p class="error_body">
                  This route wandered off. We are tracing it back to a real page and will redirect in
                  <strong id="countdown-seconds">3</strong> seconds.
                </p>
                <div class="error_actions">
                  <a id="continue-link" class="error_link is-primary" href="/">Continue now</a>
                  <a id="fallback-home-link" class="error_link" href="/">Homepage</a>
                  <a id="fallback-generator-link" class="error_link is-ghost" href="/generator/solid/">Solid generator</a>
                </div>
                <p class="error_note" id="route-note">If the redirect stalls, use one of the links above.</p>
              </div>

              <div class="hero_credit error_credit" aria-label="404 route details">
                <p class="credit_line error_credit_label">
                  Requested:
                  <span class="error_credit_value" id="requested-path">/</span>
                </p>
                <p class="credit_line error_credit_label">
                  Heading to:
                  <span class="error_credit_value" id="redirect-target">Calculating...</span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/utils/generatorRoutes.js"></script>
  <script src="js/marqueeUi.js"></script>
  <script>
    (function setupFallbackPage() {
      const redirectDelayMs = 2200;
      const basePath = window.__RPI_PAGES_BASE_PATH__ || '/';
      const requestedPathLabel = document.getElementById('requested-path');
      const redirectTargetLabel = document.getElementById('redirect-target');
      const countdownSecondsLabel = document.getElementById('countdown-seconds');
      const routeNoteLabel = document.getElementById('route-note');
      const recoveryPillText = document.getElementById('recovery-pill-text');
      const continueLink = document.getElementById('continue-link');
      const homeLink = document.getElementById('fallback-home-link');
      const generatorLink = document.getElementById('fallback-generator-link');
      const script = document.createElement('script');
      let countdownIntervalId = null;
      let redirectTimeoutId = null;

      function toDisplayPath(value) {
        try {
          const url = new URL(value, window.location.origin);
          return `${url.pathname}${url.search}`;
        } catch (error) {
          return value;
        }
      }

      function buildSolidGeneratorHref() {
        if (window.GeneratorRoutes && typeof window.GeneratorRoutes.buildGeneratorPath === 'function') {
          return window.GeneratorRoutes.buildGeneratorPath('solid', window.location.pathname);
        }

        return `${basePath}generator/solid/`;
      }

      function clearTimers() {
        window.clearTimeout(redirectTimeoutId);
        window.clearInterval(countdownIntervalId);
      }

      function startRedirect(redirectUrl) {
        const startedAt = Date.now();
        const targetPath = toDisplayPath(redirectUrl);

        continueLink.setAttribute('href', redirectUrl);
        redirectTargetLabel.textContent = targetPath;
        routeNoteLabel.textContent = `Recovery target locked: ${targetPath}`;
        recoveryPillText.textContent = '404. Recovery path locked.';

        countdownIntervalId = window.setInterval(function updateCountdown() {
          const elapsed = Date.now() - startedAt;
          const remainingMs = Math.max(0, redirectDelayMs - elapsed);
          const remainingSeconds = Math.max(1, Math.ceil(remainingMs / 1000));

          countdownSecondsLabel.textContent = String(remainingSeconds);
          recoveryPillText.textContent = `404. Recovering in ${(remainingMs / 1000).toFixed(1)}s`;
        }, 100);

        redirectTimeoutId = window.setTimeout(function performRedirect() {
          clearTimers();
          recoveryPillText.textContent = '404. Redirecting now.';
          countdownSecondsLabel.textContent = '0';
          window.location.replace(redirectUrl);
        }, redirectDelayMs);
      }

      requestedPathLabel.textContent = `${window.location.pathname}${window.location.search}`;
      homeLink.setAttribute('href', basePath);
      generatorLink.setAttribute('href', buildSolidGeneratorHref());

      script.src = `${basePath}js/utils/pagesFallback.js`;
      script.onload = function onFallbackScriptLoad() {
        const redirectUrl = window.PagesFallback && typeof window.PagesFallback.getPagesFallbackRedirectUrl === 'function'
          ? window.PagesFallback.getPagesFallbackRedirectUrl(window.location.pathname, window.location.search, {
            hostname: window.location.hostname
          })
          : basePath;

        startRedirect(redirectUrl || basePath);
      };

      script.onerror = function onFallbackScriptError() {
        clearTimers();
        continueLink.setAttribute('href', basePath);
        redirectTargetLabel.textContent = toDisplayPath(basePath);
        countdownSecondsLabel.textContent = '0';
        routeNoteLabel.textContent = 'Automatic recovery is unavailable right now. Use the links above.';
        recoveryPillText.textContent = '404. Manual recovery only.';
      };

      document.head.appendChild(script);
    })();
  </script>
</body>

</html>
